<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>366天成語解構挑戰 — 每日魔方</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-bg: rgba(22, 22, 59, 0.8);
            --accent-color: #4ecca3;
            --text-color: #eeeeee;
            --dice-gold: #d4af37;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(180deg, #16213e 0%, transparent 100%);
            width: 100%;
        }

        h1 { margin: 0; color: var(--accent-color); letter-spacing: 2px; }
        #date-display { font-size: 1.2rem; opacity: 0.8; margin-top: 5px; }

        .game-container {
            perspective: 1000px;
            display: flex;
            gap: 50px;
            margin: 40px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 3D 骰子樣式 */
        .dice {
            width: 120px;
            height: 120px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: grab;
        }

        .face {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(212, 175, 55, 0.15);
            border: 2px solid var(--dice-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--dice-gold);
            backface-visibility: hidden;
            box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.3);
            border-radius: 10px;
        }

        /* 骰子六面定位 */
        .f1 { transform: rotateY(0deg) translateZ(60px); }
        .f2 { transform: rotateY(90deg) translateZ(60px); }
        .f3 { transform: rotateY(180deg) translateZ(60px); }
        .f4 { transform: rotateY(-90deg) translateZ(60px); }
        .f5 { transform: rotateX(90deg) translateZ(60px); }
        .f6 { transform: rotateX(-90deg) translateZ(60px); }

        .info-panel {
            max-width: 600px;
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 20px;
        }

        .hint-box { font-size: 1.3rem; line-height: 1.6; margin-bottom: 20px; color: #fff; }
        .example-box { font-style: italic; color: #aaa; border-left: 4px solid var(--accent-color); padding-left: 15px; }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-rotate { background: var(--accent-color); color: #1a1a2e; }
        .btn-answer { background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); }
        button:hover { transform: translateY(-2px); filter: brightness(1.2); }

        #answer-display {
            margin-top: 20px;
            font-size: 2rem;
            color: var(--accent-color);
            display: none;
            text-shadow: 0 0 10px var(--accent-color);
        }

        @media (max-width: 600px) {
            .dice { width: 100px; height: 100px; }
            .face { width: 100px; height: 100px; font-size: 2rem; }
            .f1, .f2, .f3, .f4, .f5, .f6 { translateZ(50px); }
        }
    </style>
</head>
<body>

<header>
    <h1>成語解構骰子</h1>
    <div id="date-display">2026年3月9日 · 第 68 題</div>
</header>

<div class="game-container">
    <div class="dice" id="diceA">
        <div class="face f1"></div><div class="face f2"></div>
        <div class="face f3"></div><div class="face f4"></div>
        <div class="face f5"></div><div class="face f6"></div>
    </div>
    <div class="dice" id="diceB">
        <div class="face f1"></div><div class="face f2"></div>
        <div class="face f3"></div><div class="face f4"></div>
        <div class="face f5"></div><div class="face f6"></div>
    </div>
</div>

<div class="info-panel">
    <div class="hint-box">
        <strong>提示：</strong> <span id="hint-text">載入中...</span>
    </div>
    <div class="example-box">
        <strong>例句：</strong> <span id="example-text">載入中...</span>
    </div>
    
    <div id="answer-display"></div>

    <div class="controls">
        <button class="btn-rotate" onclick="randomRotate()">隨機轉動</button>
        <button class="btn-answer" onclick="toggleAnswer()">查看答案</button>
    </div>
</div>

<script src="366成語拆解謎題.js"></script>

<script>
    let currentIdiom = "";

    // 取得今天是該年的第幾天
    function getDayOfYear() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const diff = now - start;
        const oneDay = 1000 * 60 * 60 * 24;
        return Math.floor(diff / oneDay);
    }

    // 初始化遊戲
    function initGame() {
        const dayIdx = getDayOfYear();
        const todayData = window.getIdiomByDay(dayIdx);
        
        currentIdiom = todayData.idiom;
        
        // 更新 UI 資訊
        const now = new Date();
        document.getElementById('date-display').innerText = 
            `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 · 第 ${dayIdx} 題`;
        document.getElementById('hint-text').innerText = todayData.hint;
        document.getElementById('example-text').innerText = todayData.example;
        document.getElementById('answer-display').innerText = currentIdiom;

        // 填充骰子面
        const facesA = document.querySelectorAll('#diceA .face');
        const facesB = document.querySelectorAll('#diceB .face');
        
        todayData.parts.forEach((part, i) => {
            if (i < 6) facesA[i].innerText = part;
            else facesB[i - 6].innerText = part;
        });

        randomRotate();
    }

    // 隨機旋轉動畫
    function randomRotate() {
        const dices = [document.getElementById('diceA'), document.getElementById('diceB')];
        dices.forEach(dice => {
            const rx = Math.floor(Math.random() * 4) * 90;
            const ry = Math.floor(Math.random() * 4) * 90;
            dice.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
        });
    }

    // 顯示/隱藏答案
    function toggleAnswer() {
        const ans = document.getElementById('answer-display');
        ans.style.display = (ans.style.display === 'block') ? 'none' : 'block';
    }

    // 確保資料庫載入後執行
    window.onload = () => {
        if (typeof window.getIdiomByDay === 'function') {
            initGame();
        } else {
            document.querySelector('.hint-box').innerText = "錯誤：找不到 366 題庫檔案，請確認檔案路徑正確。";
        }
    };
</script>

</body>
</html>
