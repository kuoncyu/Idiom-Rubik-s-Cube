<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>成語魔方 - 生成音樂版 (含例句)</title>
    <script src="366成語拆解謎題.js"></script>
    <style>
        :root {
            /* 視覺風格：深邃星空與極光 */
            --bg-color: #0b0f19; 
            --text-color: #e2e8f0;
            --dice-bg: #1e293b;
            --dice-border: #64748b;
            --accent: #a855f7;   /* 神秘紫 */
            --highlight: #22d3ee; /* 電光藍 */
            --success: #34d399;
            --dice-size: 100px;
        }

        body {
            font-family: "Noto Serif TC", "PMingLiU", serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        h1 { margin-bottom: 5px; color: var(--text-color); }
        .hint-text { color: #94a3b8; font-size: 14px; margin-bottom: 20px; text-align: center; }

        /* 3D 骰子容器 */
        .dice-container {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            perspective: 1000px; /* 3D 深度 */
        }

        .scene {
            width: var(--dice-size);
            height: var(--dice-size);
            perspective: 600px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s;
            cursor: grab;
        }
        .cube:active { cursor: grabbing; }

        .cube__face {
            position: absolute;
            width: var(--dice-size);
            height: var(--dice-size);
            background: var(--dice-bg);
            border: 2px solid var(--dice-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--highlight);
            user-select: none;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            border-radius: 8px;
        }

        /* 骰子六面定位 */
        .cube__face--front  { transform: rotateY(  0deg) translateZ(calc(var(--dice-size) / 2)); }
        .cube__face--right  { transform: rotateY( 90deg) translateZ(calc(var(--dice-size) / 2)); }
        .cube__face--back   { transform: rotateY(180deg) translateZ(calc(var(--dice-size) / 2)); }
        .cube__face--left   { transform: rotateY(-90deg) translateZ(calc(var(--dice-size) / 2)); }
        .cube__face--top    { transform: rotateX( 90deg) translateZ(calc(var(--dice-size) / 2)); }
        .cube__face--bottom { transform: rotateX(-90deg) translateZ(calc(var(--dice-size) / 2)); }

        /* 輸入區 */
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .char-input {
            width: 50px;
            height: 50px;
            font-size: 30px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--dice-border);
            color: var(--highlight);
            border-radius: 8px;
            transition: border-color 0.3s;
        }
        .char-input:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

        /* 按鈕區 */
        .btn-group {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, opacity 0.3s;
        }
        button:active { transform: scale(0.95); }

        .btn-submit {
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            color: white;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }
        .btn-giveup {
            background: transparent;
            border: 1px solid var(--dice-border);
            color: #94a3b8;
        }

        /* 訊息提示 */
        #msgBox { margin-top: 15px; font-size: 18px; height: 25px; font-weight: bold; }
        .success { color: var(--success); }
        .error { color: #f87171; }

        /* 彈出視窗 */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--dice-bg);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 85%;
            border: 1px solid var(--dice-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        #mTitle { font-size: 24px; color: var(--success); margin-top: 0; }
        #mAns { font-size: 48px; color: var(--highlight); margin: 15px 0; letter-spacing: 5px; font-weight: bold; }
        #mDesc { font-size: 18px; color: var(--text-color); margin-bottom: 15px; line-height: 1.5; }
        #mExample { font-size: 16px; color: #94a3b8; font-style: italic; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; }
        
        .close-btn {
            margin-top: 20px;
            background: var(--highlight);
            color: #000;
            width: 100%;
        }

    </style>
</head>
<body>

    <h1>每日成語魔方</h1>
    <div class="hint-text">旋轉骰子觀察部件，拼出隱藏的四字成語！</div>

    <div class="dice-container">
        <div class="scene">
            <div class="cube" id="cube1">
                <div class="cube__face cube__face--front"></div>
                <div class="cube__face cube__face--back"></div>
                <div class="cube__face cube__face--right"></div>
                <div class="cube__face cube__face--left"></div>
                <div class="cube__face cube__face--top"></div>
                <div class="cube__face cube__face--bottom"></div>
            </div>
        </div>
        <div class="scene">
            <div class="cube" id="cube2">
                <div class="cube__face cube__face--front"></div>
                <div class="cube__face cube__face--back"></div>
                <div class="cube__face cube__face--right"></div>
                <div class="cube__face cube__face--left"></div>
                <div class="cube__face cube__face--top"></div>
                <div class="cube__face cube__face--bottom"></div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" class="char-input" maxlength="1" autocomplete="off">
        <input type="text" class="char-input" maxlength="1" autocomplete="off">
        <input type="text" class="char-input" maxlength="1" autocomplete="off">
        <input type="text" class="char-input" maxlength="1" autocomplete="off">
    </div>

    <div class="btn-group">
        <button class="btn-submit" onclick="checkAnswer()">確認解答</button>
        <button class="btn-giveup" onclick="giveUp()">放棄挑戰</button>
    </div>

    <div id="msgBox"></div>

    <div id="modal">
        <div class="modal-content">
            <h2 id="mTitle">🎉 挑戰成功</h2>
            <div id="mAns">一元復始</div>
            <div id="mDesc">指新的一年開始...</div>
            <div id="mExample">例句：新年到了...</div>
            <button class="close-btn" onclick="closeModal()">再玩一次 (測試用)</button>
        </div>
    </div>

    <script>
        let currentData = null;
        let musicTimer = null; // 模擬音樂播放變數
        
        // 取得今天是今年的第幾天，以決定題目
        function getDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            return Math.floor(diff / oneDay);
        }

        // 初始化遊戲
        function initGame() {
            // 從外部 JS (366成語拆解謎題.js) 取得今天的題目
            const day = getDayOfYear();
            currentData = window.getIdiomByDay(day);

            // 清空輸入框與訊息
            document.querySelectorAll('.char-input').forEach(input => input.value = '');
            document.getElementById('msgBox').innerText = '';

            // 將 12 個部件填入兩顆骰子的六個面
            const faces1 = document.querySelectorAll('#cube1 .cube__face');
            const faces2 = document.querySelectorAll('#cube2 .cube__face');
            
            for(let i = 0; i < 6; i++) {
                faces1[i].innerText = currentData.parts[i] || '丶';
                faces2[i].innerText = currentData.parts[i + 6] || '丶';
            }
        }

        // --- 核心修復：處理注音輸入法跳格問題 ---
        const inputs = document.querySelectorAll('.char-input');
        let isComposing = false;

        inputs.forEach((input, index) => {
            // 1. 開始拼字 (如打 ㄅ)
            input.addEventListener('compositionstart', () => {
                isComposing = true;
            });

            // 2. 拼字結束並選好國字
            input.addEventListener('compositionend', (e) => {
                isComposing = false;
                // 確保只留最後一個字 (防呆)
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.charAt(e.target.value.length - 1);
                }
                // 自動跳到下一格
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            // 3. 一般輸入 (英數、複製貼上)
            input.addEventListener('input', (e) => {
                // 如果正在用注音拼字，就不要提早觸發跳格
                if (isComposing) return;

                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.charAt(e.target.value.length - 1);
                }
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            // 4. 優化退回鍵體驗
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                    inputs[index - 1].value = ''; // 順便幫忙清空前一格
                }
                if (e.key === 'Enter') {
                    checkAnswer();
                }
            });
        });

        // --- 檢查答案與互動邏輯 ---
        function checkAnswer() {
            let ans = "";
            document.querySelectorAll('.char-input').forEach(i => ans += i.value);
            const msg = document.getElementById('msgBox');
            
            if (ans.length < 4) {
                msg.innerHTML = "⚠️ 請填滿四個字";
                msg.className = "msg-box error";
                return;
            }

            if (ans === currentData.idiom) {
                msg.innerHTML = "🎉 完美解謎！";
                msg.className = "msg-box success";
                // playWinSound(); // 如果您有寫音效可以取消註解
                showModal(true);
            } else {
                msg.innerHTML = "❌ 拼圖錯誤，再試試看！";
                msg.className = "msg-box error";
                // playErrorSound(); // 如果您有寫音效可以取消註解
            }
        }

        function giveUp() {
            if(confirm("確定要放棄挑戰並看答案嗎？")) {
                showModal(false);
            }
        }

        function showModal(success) {
            const modal = document.getElementById('modal');
            document.getElementById('mTitle').innerText = success ? "🎉 挑戰成功" : "💡 正確解答";
            document.getElementById('mTitle').style.color = success ? "var(--success)" : "#f87171";
            
            document.getElementById('mAns').innerText = currentData.idiom;
            document.getElementById('mDesc').innerText = currentData.hint;
            document.getElementById('mExample').innerText = currentData.example;

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            // 測試用：強制換下一天
            currentData = window.getIdiomByDay(Math.floor(Math.random() * 366) + 1);
            initGame();
        }

        // --- 3D 骰子滑動旋轉邏輯 ---
        function setupCubeRotation(cubeId) {
            const cube = document.getElementById(cubeId);
            let isDragging = false;
            let currentX = -20, currentY = -25; // 初始角度
            let startX, startY;

            // 設定初始角度
            cube.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg)`;

            const startDrag = (e) => {
                isDragging = true;
                startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
                startY = e.type.includes('mouse') ? e.pageY : e.touches[0].pageY;
            };

            const drag = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const x = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
                const y = e.type.includes('mouse') ? e.pageY : e.touches[0].pageY;
                
                // 計算滑動差異
                const deltaX = x - startX;
                const deltaY = y - startY;
                
                currentY += deltaX * 0.5;
                currentX -= deltaY * 0.5;
                
                cube.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg)`;
                startX = x;
                startY = y;
            };

            const endDrag = () => { isDragging = false; };

            cube.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', drag);
            window.addEventListener('mouseup', endDrag);

            cube.addEventListener('touchstart', startDrag, {passive: false});
            window.addEventListener('touchmove', drag, {passive: false});
            window.addEventListener('touchend', endDrag);
        }

        // 啟動
        window.onload = () => {
            initGame();
            setupCubeRotation('cube1');
            setupCubeRotation('cube2');
        };
    </script>
</body>
</html>
