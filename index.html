<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>成語拆字魔方 - 366每日挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');

        :root {
            --bg-color: #0b1120; 
            --text-color: #f8fafc;
            --dice-bg: rgba(15, 23, 42, 0.85);
            --dice-border: #334155;
            --accent: #10b981;
            --highlight: #38bdf8;
            --dice-size: 110px;
        }

        body {
            font-family: "Noto Serif TC", "PMingLiU", serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 15px 10px;
            overflow-x: hidden; touch-action: pan-y; user-select: none;
            background-image: radial-gradient(circle at 50% -10%, #1e3a8a, var(--bg-color) 80%);
        }

        /* 3D 場景與骰子設定 */
        .scene {
            width: var(--dice-size); height: var(--dice-size);
            perspective: 1000px; margin: 15px; display: inline-block;
        }

        .cube {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(20deg);
            cursor: grab;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .cube:active { cursor: grabbing; }

        .face {
            position: absolute; width: var(--dice-size); height: var(--dice-size);
            background: var(--dice-bg); border: 1px solid var(--dice-border);
            box-shadow: inset 0 0 25px rgba(56, 189, 248, 0.1), 0 8px 20px rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            font-size: 46px; font-weight: 900; color: var(--highlight);
            text-shadow: 0 0 12px rgba(56, 189, 248, 0.5);
            border-radius: 16px; backdrop-filter: blur(8px);
        }

        .front  { transform: rotateY(  0deg) translateZ(calc(var(--dice-size) / 2)); }
        .right  { transform: rotateY( 90deg) translateZ(calc(var(--dice-size) / 2)); }
        .back   { transform: rotateY(180deg) translateZ(calc(var(--dice-size) / 2)); }
        .left   { transform: rotateY(-90deg) translateZ(calc(var(--dice-size) / 2)); }
        .top    { transform: rotateX( 90deg) translateZ(calc(var(--dice-size) / 2)); }
        .bottom { transform: rotateX(-90deg) translateZ(calc(var(--dice-size) / 2)); }

        .input-box {
            background: rgba(15, 23, 42, 0.6); border: 2px solid var(--dice-border);
            color: white; text-align: center; font-size: 26px; letter-spacing: 6px;
            outline: none; border-radius: 12px; padding: 10px; width: 220px;
            transition: all 0.3s ease; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .input-box:focus { border-color: var(--highlight); box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }

        .glass-panel {
            background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 25px; max-width: 550px; width: 100%;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); backdrop-filter: blur(15px);
        }

        /* 提示解鎖區塊 */
        .hint-container {
            position: relative; min-height: 80px; background: rgba(0,0,0,0.3);
            border-radius: 12px; border: 1px dashed rgba(255,255,255,0.2);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; padding: 15px;
        }
        .hint-container:hover { border-color: var(--highlight); background: rgba(0,0,0,0.4); }
        .hint-overlay {
            position: absolute; inset: 0; backdrop-filter: blur(8px); background: rgba(15, 23, 42, 0.85);
            display: flex; align-items: center; justify-content: center; z-index: 10;
            font-weight: bold; color: #94a3b8; transition: opacity 0.5s ease-in-out;
        }
        .hint-container.unlocked .hint-overlay { opacity: 0; pointer-events: none; }
        
        #audio-ctrl {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.05); border-radius: 50%; width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        #audio-ctrl:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="audio-ctrl" title="開關音樂與音效">🔇</div>

    <div class="text-center mb-4 mt-2">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-400 mb-2 tracking-wide">成語拆字魔方</h1>
        <div class="flex items-center justify-center gap-2">
            <span id="mode-badge" class="bg-blue-600 text-white text-xs px-3 py-1 rounded-full font-bold shadow-lg shadow-blue-500/30">📅 本日挑戰</span>
            <span id="day-text" class="text-blue-200 text-sm font-bold tracking-wider">第 -- 題</span>
        </div>
    </div>

    <!-- 3D 骰子區塊 -->
    <div class="flex justify-center gap-6 mb-8 mt-4">
        <div class="scene">
            <div class="cube" id="cube1">
                <div class="face front"></div><div class="face right"></div><div class="face back"></div>
                <div class="face left"></div><div class="face top"></div><div class="face bottom"></div>
            </div>
        </div>
        <div class="scene">
            <div class="cube" id="cube2">
                <div class="face front"></div><div class="face right"></div><div class="face back"></div>
                <div class="face left"></div><div class="face top"></div><div class="face bottom"></div>
            </div>
        </div>
    </div>

    <!-- 遊戲互動區塊 -->
    <div class="glass-panel">
        
        <!-- 隱藏式提示區 -->
        <div class="mb-6">
            <p class="text-blue-300 font-bold mb-2 text-sm tracking-widest">【釋義提示】</p>
            <div id="hint-box" class="hint-container" onclick="unlockHint()">
                <div class="hint-overlay" id="hint-overlay">
                    <span>🔒 點擊解鎖提示（防雷遮擋）</span>
                </div>
                <p id="hint-text" class="text-gray-200 text-sm md:text-base leading-relaxed opacity-0 transition-opacity duration-700">載入中...</p>
            </div>
        </div>
        
        <div class="flex flex-col sm:flex-row justify-center items-center gap-3 mb-5">
            <input type="text" id="answer-input" class="input-box" maxlength="4" placeholder="輸入成語" autocomplete="off">
            <button id="submit-btn" class="bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg hover:shadow-cyan-500/40 w-full sm:w-auto">
                解謎驗證
            </button>
        </div>

        <p id="message" class="text-xl font-bold min-h-[32px] mb-4"></p>

        <button id="next-btn" class="text-sm text-gray-400 hover:text-white underline decoration-dashed underline-offset-4 transition-colors">
            ⏭️ 隨機抽一題自由練習
        </button>
    </div>

    <script>
        // ==========================================
        // 1. 進階空間音響系統 (Spatial Audio API)
        // ==========================================
        let audioCtx, masterGain, delayNode, feedbackGain;
        let bgmInterval = null;
        let soundEnabled = false;

        const pentatonic = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.7;

            delayNode = audioCtx.createDelay();
            delayNode.delayTime.value = 0.35;
            
            feedbackGain = audioCtx.createGain();
            feedbackGain.gain.value = 0.3;

            delayNode.connect(feedbackGain);
            feedbackGain.connect(delayNode);
            
            delayNode.connect(masterGain);
            masterGain.connect(audioCtx.destination);
        }

        function playTone(freq, type, attack, release, vol, useDelay = true) {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.value = freq;
            
            osc.connect(gain);
            gain.connect(masterGain);
            if (useDelay) gain.connect(delayNode);

            const now = audioCtx.currentTime;
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(vol, now + attack);
            gain.gain.exponentialRampToValueAtTime(0.001, now + attack + release);

            osc.start(now);
            osc.stop(now + attack + release + 0.1);
        }

        function playSynth(type) {
            if (!soundEnabled || !audioCtx) return;
            if (type === 'win') {
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, i) => {
                    setTimeout(() => playTone(freq, 'sine', 0.05, 1.5, 0.4, true), i * 100);
                    setTimeout(() => playTone(freq, 'triangle', 0.05, 1.0, 0.2, true), i * 100);
                });
            } else if (type === 'wrong') {
                playTone(120, 'sine', 0.01, 0.4, 0.6, false);
                playTone(80, 'triangle', 0.01, 0.3, 0.4, false);
            } else if (type === 'spin') {
                playTone(300 + Math.random()*100, 'triangle', 0.01, 0.05, 0.1, false);
            } else if (type === 'unlock') {
                playTone(440.00, 'sine', 0.1, 1.2, 0.3, true);
                playTone(659.25, 'sine', 0.1, 1.2, 0.2, true);
            }
        }

        function startBGM() {
            if (bgmInterval) return;
            bgmInterval = setInterval(() => {
                if (!soundEnabled || !audioCtx) return;
                const freq = pentatonic[Math.floor(Math.random() * pentatonic.length)];
                playTone(freq / 2, 'sine', 2.0, 4.0, 0.15, true); 
            }, 2500);
        }

        function toggleAudio() {
            initAudio();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            soundEnabled = !soundEnabled;
            document.getElementById('audio-ctrl').innerText = soundEnabled ? "🔊" : "🔇";
            document.getElementById('audio-ctrl').classList.toggle('bg-blue-500/30', soundEnabled);
            if(soundEnabled) { startBGM(); playSynth('unlock'); } 
            else { clearInterval(bgmInterval); bgmInterval = null; }
        }
        document.getElementById('audio-ctrl').addEventListener('click', toggleAudio);


        // ==========================================
        // 2. 超級擴充版拆字字典 (修復 undefined 漏洞)
        // ==========================================
        const binaryMap = {
            "四":["囗","儿"], "面":["丆","面下"], "面下":["囗","三"], "歌":["哥","欠"], "哥":["丁","可"], "可":["丁","口"], "楚":["林","疋"], "林":["木","木"], "疋":["乛","龰"],
            "明":["日","月"], "家":["宀","豕"], "安":["宀","女"], "平":["干","八"], "和":["禾","口"], "禾":["丿","木"], "水":["亅","氺"], "火":["丶","火下"], "火下":["丿","乀"],
            "山":["丨","凵"], "凵":["乚","丨"], "花":["艹","化"], "化":["亻","匕"], "似":["亻","以"], "以":["乚","人"], "一":["一","一"], "如":["女","口"], "心":["丿","心下"],
            "日":["口","一"],"口":["冂","一"],"冂":["丨","𠃍"],"木":["十","八"],"十":["一","丨"],
            "八":["丿","乀"],"人":["丿","乀"],"大":["一","人"],"天":["一","大"],"白":["丿","日"],
            "百":["一","白"],"千":["丿","十"],"女":["ㄑ","乂"],"乂":["丿","乀"],"子":["了","一"],
            "了":["乛","亅"],"氵":["丶","冫"],"冫":["丶","㇀"],"宀":["丶","冖"],"冖":["丶","乛"],
            "艹":["十","十"],"心下":["乚","心右"],"心右":["丶","丶"],
            "月":["冂","二"],"二":["一","一"],"田":["囗","十"],"目":["冂","三"],"三":["一","二"],
            "彳":["丿","亻"],"亻":["丿","丨"],"辶":["丶","辶下"],"辶下":["㇋","㇏"],"阝":["㇌","丨"],
            "广":["丶","厂"],"厂":["一","丿"],"疒":["广","冫"],"穴":["宀","八"],"土":["十","一"],
            "士":["十","一"],"王":["一","土"],"玉":["王","丶"],"石":["厂","口"],"言":["亠","言下"],
            "亠":["丶","一"],"言下":["二","口"],"貝":["目","八"],"車":["車上","十"],"車上":["一","日"],
            "門":["门","丨"], /* 修復：補齊第二部件避免出現 undefined */
            "廴":["フ","乀"],"犭":["丿","豕"],"豕":["一","豕下"],"豕下":["丿","乀"],
            "飠":["人","良"],"良":["丶","艮"],"艮":["日","艮下"],"艮下":["𠄌","乀"],"衤":["亠","衤下"],"衤下":["丿","㇏"],
            "礻":["丶","衤下"],"足":["口","止"],"止":["丨","止下"],"止下":["一","二"],"虫":["口","虫下"],"虫下":["丨","二"],
            "金":["人","金下"],"金下":["王","丷"],"丷":["丶","丿"],"馬":["馬上","灬"],"馬上":["日","丨"],"灬":["丶","三"],
            "鳥":["白","ㄅ"],"魚":["⺈","魚下"],"⺈":["丿","乛"],"魚下":["田","灬"],"雨":["一","雨下"],"雨下":["冂","氺"],"氺":["亅","八"],
            "革":["廿","革下"],"廿":["十","十"],"革下":["口","十"],"骨":["冎","月"],"冎":["冂","冎下"],"冎下":["┌","┐"],
            "鬼":["丿","鬼下"],"鬼下":["田","儿"],"儿":["丿","乚"],"鹿":["广","鹿下"],"鹿下":["比","鹿下下"],"比":["匕","匕"],"匕":["丿","乚"],"鹿下下":["二","儿"],
            "麻":["广","林"],"黑":["里","灬"],"里":["田","土"]
        };

        const strokePool = ["一", "丨", "丿", "丶", "乚", "二", "十", "口", "日"];

        // ==========================================
        // 3. 升級版：公平輪替拆解演算法 + 防呆保護
        // ==========================================
        function decomposeTo12(idiom) {
            let parts = idiom.split('').map((ch, idx) => ({ text: ch, origin: idx, splits: 0 }));
            
            function splitTarget(target) {
                let splitResult = binaryMap[target.text];
                let index = parts.indexOf(target);
                
                // 防禦性處理：若字典漏字或只有單一部件，避免產生 undefined
                let part1 = splitResult[0] || "一";
                let part2 = splitResult[1];

                if (part2) {
                    parts.splice(index, 1,
                        { text: part1, origin: target.origin, splits: target.splits + 1 },
                        { text: part2, origin: target.origin, splits: target.splits + 1 }
                    );
                } else {
                    parts.splice(index, 1,
                        { text: part1, origin: target.origin, splits: target.splits + 1 }
                    );
                }
            }

            for(let origin = 0; origin < 4; origin++) {
                let target = parts.find(p => p.origin === origin && binaryMap[p.text]);
                if (target && parts.length < 12) splitTarget(target);
            }

            let safetyLoop = 0;
            while (parts.length < 12 && safetyLoop < 100) {
                safetyLoop++;
                let counts = [0, 0, 0, 0];
                parts.forEach(p => counts[p.origin]++);
                let splittable = parts.filter(p => binaryMap[p.text]);

                if (splittable.length > 0) {
                    splittable.sort((a, b) => {
                        if (counts[a.origin] !== counts[b.origin]) return counts[a.origin] - counts[b.origin];
                        return a.splits - b.splits;
                    });
                    splitTarget(splittable[0]);
                } else {
                    parts.sort((a,b) => counts[a.origin] - counts[b.origin]);
                    let stroke = strokePool[Math.floor(Math.random() * strokePool.length)];
                    parts.push({ text: stroke, origin: parts[0].origin, splits: 99 });
                }
            }

            return parts.map(p => p.text).sort(() => Math.random() - 0.5); 
        }

        // ==========================================

壞與外表的妍媸。|生死存亡:關乎生命或國家的存亡。|得失成敗:獲得與失去，成功與失敗。|聚散離合:人的相聚與分離。|悲歡離合:泛指人世間的各種遭遇。|陰晴圓缺:比喻事物的盛衰變化。|起承轉合:文章寫作的結構。|宮商角徵:五聲音階。|赤橙黃綠:各種顏色。|青藍紫黑:色彩豐富。|白灰粉紅:色彩鮮明。";

        const DB = [];
        rawIdiomsData.split('|').forEach(item => {
            let parts = item.split(':');
            if (parts.length >= 2) DB.push([parts[0], parts[1]]);
        });
        while (DB.length < 366) { DB.push(DB[DB.length % DB.length]); }

        let currentIdiomData = null;

        function getDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            return Math.floor((now - start) / (1000 * 60 * 60 * 24));
        }

        function lockHint() {
            const hintContainer = document.getElementById('hint-box');
            const hintText = document.getElementById('hint-text');
            hintContainer.classList.remove('unlocked');
            hintText.classList.replace('opacity-100', 'opacity-0');
        }

        window.unlockHint = function() {
            const hintContainer = document.getElementById('hint-box');
            if(!hintContainer.classList.contains('unlocked')) {
                hintContainer.classList.add('unlocked');
                document.getElementById('hint-text').classList.replace('opacity-0', 'opacity-100');
                playSynth('unlock');
            }
        }

        function loadIdiom(isDaily) {
            let index, word, hintStr;
            if (isDaily) {
                const day = getDayOfYear();
                document.getElementById('mode-badge').innerText = "📅 本日挑戰";
                document.getElementById('day-text').innerText = `第 ${day} 天`;
                index = (day - 1) % DB.length;
            } else {
                document.getElementById('mode-badge').innerText = "🎲 自由模式";
                document.getElementById('day-text').innerText = "隨機練功";
                index = Math.floor(Math.random() * DB.length);
            }

            word = DB[index][0];
            hintStr = DB[index][1].replace(new RegExp(`[${word}]`, 'g'), "〇");
            
            const parts = decomposeTo12(word);
            currentIdiomData = { word, parts };

            document.getElementById('hint-text').innerHTML = hintStr;
            document.getElementById('answer-input').value = "";
            document.getElementById('message').innerText = "";
            document.getElementById('answer-input').focus();
            lockHint(); 

            const cube1Faces = document.querySelectorAll('#cube1 .face');
            const cube2Faces = document.querySelectorAll('#cube2 .face');
            for(let i=0; i<6; i++) {
                // 核心修復：加上 || "" 防呆，若陣列無法湊齊12個，則乾淨留白不顯示 undefined
                cube1Faces[i].innerText = parts[i] || "";
                cube2Faces[i].innerText = parts[i+6] || "";
            }

            document.getElementById('cube1').style.transform = `rotateX(-20deg) rotateY(20deg)`;
            document.getElementById('cube2').style.transform = `rotateX(-20deg) rotateY(-20deg)`;
        }

        document.getElementById('submit-btn').addEventListener('click', checkAnswer);
        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });

        function checkAnswer() {
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            const input = document.getElementById('answer-input').value.trim();
            const msgEl = document.getElementById('message');
            
            if (input === currentIdiomData.word) {
                msgEl.innerText = "🎉 答對了！字神降臨！";
                msgEl.className = "text-xl font-bold min-h-[32px] mb-4 text-emerald-400 drop-shadow-[0_0_10px_rgba(16,185,129,0.8)]";
                playSynth('win');
            } else {
                msgEl.innerText = "❌ 答錯囉，點擊提示看看？";
                msgEl.className = "text-xl font-bold min-h-[32px] mb-4 text-rose-400 drop-shadow-[0_0_10px_rgba(244,63,94,0.8)]";
                playSynth('wrong');
            }
        }

        document.getElementById('next-btn').addEventListener('click', () => {
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            loadIdiom(false);
        });

        // ==========================================
        // 5. 3D 骰子拖曳控制
        // ==========================================
        function enableDrag(cubeId) {
            const el = document.getElementById(cubeId);
            let isDragging = false;
            let startX, startY, currentX = -20, currentY = (cubeId === 'cube1' ? 20 : -20);
            let rotateX = currentX, rotateY = currentY;
            let lastPlayTime = 0;

            const start = (e) => {
                isDragging = true;
                startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                el.style.transition = 'none'; el.style.cursor = 'grabbing';
            };

            const move = (e) => {
                if (!isDragging) return;
                if (e.cancelable && e.type.includes('touch')) e.preventDefault();
                const cx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const cy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                rotateY = currentY + (cx - startX) * 0.6;
                rotateX = currentX - (cy - startY) * 0.6;
                el.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

                const now = Date.now();
                if (now - lastPlayTime > 150) {
                    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                    playSynth('spin'); lastPlayTime = now;
                }
            };

            const end = () => {
                if (!isDragging) return;
                isDragging = false; 
                currentX = rotateX; currentY = rotateY;
                el.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
                el.style.cursor = 'grab';
            };

            el.addEventListener('mousedown', start); 
            window.addEventListener('mousemove', move); 
            window.addEventListener('mouseup', end);
            el.addEventListener('touchstart', start, {passive: false}); 
            window.addEventListener('touchmove', move, {passive: false}); 
            window.addEventListener('touchend', end);
        }

        enableDrag('cube1');
        enableDrag('cube2');
        loadIdiom(true);

    </script>
