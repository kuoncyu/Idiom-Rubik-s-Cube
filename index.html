<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日成語拆解謎題</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .date-display {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
        }
        /* 12宮格佈局 */
        .parts-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .part-box {
            background-color: #ecf0f1;
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #2980b9;
        }
        .part-box.empty {
            background-color: #fafafa;
            border: 1px solid #eaeaea;
        }
        .hint-section {
            background-color: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
            border-radius: 4px;
            font-size: 15px;
        }
        .input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 18px;
            width: 60%;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-align: center;
            letter-spacing: 2px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2ecc71;
        }
        .message {
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            min-height: 24px;
        }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="container">
        <h1>每日成語拆解謎題</h1>
        <div id="dateDisplay" class="date-display">載入中...</div>

        <div id="partsGrid" class="parts-grid">
            </div>

        <div class="hint-section">
            <strong>💡 釋義提示：</strong>
            <span id="hintText">載入中...</span>
        </div>

        <div class="input-group">
            <input type="text" id="answerInput" maxlength="4" placeholder="請輸入四字成語">
            <button onclick="checkAnswer()">送出</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script src="366成語拆解謎題.js"></script>

    <script>
        let currentIdiomData = null;

        // 計算今天是今年的第幾天 (1~366)
        function getDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = (now - start) + ((start.getTimezoneOffset() - now.getTimezoneOffset()) * 60 * 1000);
            const oneDay = 1000 * 60 * 60 * 24;
            const day = Math.floor(diff / oneDay);
            return day;
        }

        // 初始化遊戲
        function initGame() {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth() + 1;
            const date = today.getDate();
            const dayOfYear = getDayOfYear();

            // 顯示日期與第幾天
            document.getElementById('dateDisplay').textContent = 
                `${year}年${month}月${date}日 (本年度第 ${dayOfYear} 天)`;

            // 呼叫 366成語拆解謎題.js 中的 API 取得當日題目
            if (typeof window.getIdiomByDay === 'function') {
                currentIdiomData = window.getIdiomByDay(dayOfYear);
                renderGame(currentIdiomData);
            } else {
                document.getElementById('message').innerHTML = '<span class="error">載入題庫失敗，請確認 366成語拆解謎題.js 檔案是否存在。</span>';
            }
        }

        // 渲染畫面
        function renderGame(data) {
            // 填入提示
            document.getElementById('hintText').textContent = data.hint;

            // 填入 12 個零件
            const grid = document.getElementById('partsGrid');
            grid.innerHTML = ''; // 清空
            
            data.parts.forEach(part => {
                const box = document.createElement('div');
                box.className = 'part-box';
                // 如果零件是空的，給予特定的樣式讓他看起來像空白預留位
                if (part === "") {
                    box.classList.add('empty');
                } else {
                    box.textContent = part;
                }
                grid.appendChild(box);
            });
        }

        // 檢查答案
        function checkAnswer() {
            const input = document.getElementById('answerInput').value.trim();
            const msgBox = document.getElementById('message');

            if (!input) {
                msgBox.innerHTML = '<span class="error">請輸入答案！</span>';
                return;
            }

            if (input.length !== 4) {
                msgBox.innerHTML = '<span class="error">請輸入「四個字」的成語！</span>';
                return;
            }

            if (input === currentIdiomData.idiom) {
                msgBox.innerHTML = `<span class="success">🎉 答對了！恭喜完成今日挑戰！<br>例句：${currentIdiomData.example}</span>`;
            } else {
                msgBox.innerHTML = '<span class="error">❌ 答錯囉！請再仔細看看零件與提示。</span>';
            }
        }

        // 監聽 Enter 鍵直接送出
        document.getElementById('answerInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // 網頁載入完成後啟動
        window.onload = initGame;
    </script>
</body>
</html>
